  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

enter;\n    gap: 10px;\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 1.5px;\n    text-transform: uppercase;\n    color: var(--orange);\n    margin-bottom: 12px;\n  }\n  .section-label::before {\n    content: '';\n    width: 24px;\n    height: 2px;\n    background: var(--orange);\n  }\n  .section-head h3 {\n    font-size: 28px;\n    font-weight: 700;\n    color: var(--navy);\n    margin: 0 0 8px;\n    letter-spacing: -0.3px;\n  }\n  .section-head .subtitle {\n    font-style: italic;\n    color: var(--ink-mute);\n    font-size: 15px;\n    margin: 0;\n    text-wrap: pretty;\n  }\n\n  /* INNER NOTICE (Comunicação) */\n  .inner-notice {\n    background: var(--orange-softer);\n    border: 1px solid #f4cdbd;\n    border-radius: 10px;\n    padding: 16px 18px;\n    margin-bottom: 28px;\n    display: flex;\n    gap: 14px;\n    font-size: 13.5px;\n    color: #6b3220;\n    line-height: 1.55;\n  }\n  .inner-notice-icon {\n    flex-shrink: 0;\n    width: 22px;\n    height: 22px;\n    color: var(--orange);\n    margin-top: 1px;\n  }\n\n  /* CARD GRID */\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: 22px;\n  }\n\n  .card {\n    background: var(--white);\n    border: 1px solid var(--border);\n    border-top: 3px solid var(--orange);\n    border-radius: 10px;\n    padding: 26px 26px 24px;\n    display: flex;\n    flex-direction: column;\n    box-shadow: 0 1px 2px rgba(20,28,50,0.04), 0 4px 14px rgba(20,28,50,0.04);\n    transition: transform 0.18s, box-shadow 0.18s;\n  }\n  .card:hover {\n    transform: translateY(-2px);\n    box-shadow: 0 2px 4px rgba(20,28,50,0.06), 0 12px 28px rgba(20,28,50,0.08);\n  }\n\n  .card-tags {\n    display: flex;\n    gap: 8px;\n    flex-wrap: wrap;\n    margin-bottom: 14px;\n  }\n  .tag {\n    display: inline-block;\n    padding: 4px 10px;\n    border-radius: 999px;\n    font-size: 10.5px;\n    font-weight: 700;\n    letter-spacing: 0.8px;\n    text-transform: uppercase;\n    line-height: 1.4;\n  }\n  .tag.guia       { background: var(--tag-guia-bg);   color: var(--tag-guia-fg); }\n  .tag.instrumento{ background: var(--tag-instr-bg);  color: var(--tag-instr-fg); }\n  .tag.formulario { background: var(--tag-instr-bg);  color: var(--tag-instr-fg); }\n  .tag.relatorio  { background: var(--tag-rel-bg);    color: var(--tag-rel-fg); }\n  .tag.glossario  { background: var(--tag-glos-bg);   color: var(--tag-glos-fg); }\n  .tag.material   { background: var(--tag-mat-bg);    color: var(--tag-mat-fg); }\n  .tag.individualizado { background: var(--tag-relind-bg); color: var(--tag-relind-fg); }\n  .tag.video      { background: var(--tag-video-bg);    color: var(--tag-video-fg); }\n  .tag.apresentacao { background: var(--tag-apres-bg);  color: var(--tag-apres-fg); }\n  .tag.painel     { background: var(--tag-painel-bg);   color: var(--tag-painel-fg); }\n  .tag.template   { background: var(--tag-template-bg); color: var(--tag-template-fg); }\n  .tag.apendice   { background: var(--tag-apendice-bg); color: var(--tag-apendice-fg); }\n  .tag.warn {\n    background: transparent;\n    color: var(--orange);\n    border: 1px solid var(--orange);\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    text-transform: none;\n    letter-spacing: 0.3px;\n    font-weight: 600;\n    font-size: 10.5px;\n  }\n  .tag.warn svg { width: 11px; height: 11px; }\n\n  .card h4 {\n    font-size: 17px;\n    font-weight: 700;\n    line-height: 1.35;\n    color: var(--navy);\n    margin: 0 0 12px;\n    letter-spacing: -0.1px;\n    text-wrap: balance;\n  }\n  .card p {\n    font-size: 14px;\n    color: var(--ink-soft);\n    line-height: 1.6;\n    margin: 0 0 22px;\n    flex: 1;\n    text-wrap: pretty;\n  }\n  .btn {\n    align-self: flex-start;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: var(--orange);\n    color: var(--white);\n    text-decoration: none;\n    font-weight: 600;\n    font-size: 13px;\n    padding: 11px 18px;\n    border-radius: 999px;\n    transition: background 0.15s, transform 0.15s;\n    letter-spacing: 0.2px;\n  }\n  .btn:hover {\n    background: #c8400f;\n  }\n  .status-dev {\n    align-self: flex-start;\n    display: inline-flex;\n    align-items: center;\n    gap: 7px;\n    background: var(--bg);\n    color: var(--ink-mute);\n    border: 1px dashed var(--border);\n    font-weight: 600;\n    font-size: 12.5px;\n    padding: 10px 16px;\n    border-radius: 999px;\n    letter-spacing: 0.2px;\n  }\n  .status-dev svg { width: 14px; height: 14px; opacity: 0.85; }\n  .btn svg { width: 13px; height: 13px; }\n\n  /* FOOTER */\n  .site-footer {\n    margin-top: 80px;\n    background: var(--navy);\n    color: #c7d0e0;\n  }\n  .footer-inner {\n    max-width: 1180px;\n    margin: 0 auto;\n    padding: 44px 28px 36px;\n    display: grid;\n    grid-template-columns: 1.4fr 1fr;\n    gap: 32px;\n  }\n  .footer-brand h5 {\n    font-size: 15px;\n    font-weight: 700;\n    color: var(--white);\n    margin: 0 0 8px;\n  }\n  .footer-brand p {\n    font-size: 13px;\n    margin: 0 0 6px;\n    color: #a8b3c8;\n    line-height: 1.55;\n  }\n  .footer-contact {\n    font-size: 13px;\n    color: #a8b3c8;\n  }\n  .footer-contact strong {\n    display: block;\n    color: var(--white);\n    margin-bottom: 6px;\n    font-weight: 600;\n    text-transform: uppercase;\n    letter-spacing: 1px;\n    font-size: 11px;\n  }\n  .footer-contact a {\n    color: var(--white);\n    text-decoration: none;\n    border-bottom: 1px dotted rgba(255,255,255,0.4);\n  }\n  .footer-logos {\n    border-top: 1px solid rgba(255,255,255,0.1);\n    max-width: 1180px;\n    margin: 0 auto;\n    padding: 26px 28px 30px;\n  }\n  .footer-logos-label {\n    display: block;\n    font-size: 11px;\n    font-weight: 600;\n    text-transform: uppercase;\n    letter-spacing: 1px;\n    color: #8995af;\n    margin-bottom: 16px;\n  }\n  .logo-band {\n    background: #fff;\n    border-radius: 10px;\n    padding: 18px 26px;\n  }\n  .logo-band img {\n    display: block;\n    width: 100%;\n    max-width: 1080px;\n    height: auto;\n    margin: 0 auto;\n  }\n  @media (max-width: 880px) {\n    .footer-logos { padding: 22px 18px 26px; }\n    .logo-band { padding: 14px 16px; }\n  }\n  .footer-bar {\n    border-top: 1px solid rgba(255,255,255,0.1);\n    padding: 16px 28px;\n    text-align: center;\n    font-size: 12px;\n    color: #8995af;\n    letter-spacing: 0.3px;\n  }\n\n  /* Responsive */\n  @media (max-width: 880px) {\n    .header-inner { padding: 14px 18px 0; }\n    .site-nav { padding: 4px 0 6px; overflow-x: auto; flex-wrap: nowrap; }\n    .site-nav a { font-size: 12px; padding: 9px 12px; }\n    main { padding: 0 18px; }\n    .home { padding: 44px 0 40px; }\n    .home h2 { font-size: 28px; }\n    .section { padding: 48px 0 8px; }\n    .section-head h3 { font-size: 22px; }\n    .grid { grid-template-columns: 1fr; gap: 16px; }\n    .card { padding: 22px 20px; }\n    .footer-inner { grid-template-columns: 1fr; padding: 32px 18px 28px; gap: 24px; }\n    .notice-inner { padding: 12px 18px; font-size: 12.5px; }\n    html { scroll-padding-top: 180px; }\n  }\n</style>\n</head>\n\n<body>\n\n<header class=\"site-header\">\n  <div class=\"header-inner\">\n    <div class=\"brand-row\">\n      <div class=\"brand-mark\" aria-hidden=\"true\">F</div>\n      <div class=\"brand-text\">\n        <h1>Federalização da RNDS</h1>\n        <p>Repositório de Materiais — Etapa Estadual</p>\n      </div>\n    </div>\n    <nav class=\"site-nav\" aria-label=\"Navegação principal\">\n      <a href=\"#materiais-gerais\">Materiais Gerais</a>\n      <a href=\"#plano-trabalho\">Plano de Trabalho</a>\n      <a href=\"#institucional-governanca\">Institucional e Governança</a>\n      <a href=\"#informacao-informatica\">Informação e Informática</a>\n      <a href=\"#comunicacao\">Comunicação</a>\n      <a href=\"#jornada\">Jornada</a>\n      <a href=\"#apendice\">Apêndice</a>\n      <a href=\"#formularios\">Formulários</a>\n    </nav>\n  </div>\n</header>\n\n<div class=\"notice\" role=\"note\" aria-label=\"Aviso de uso interno\">\n  <div class=\"notice-inner\">\n    <svg class=\"notice-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n      <rect x=\"4\" y=\"11\" width=\"16\" height=\"10\" rx=\"2\"></rect>\n      <path d=\"M8 11V7a4 4 0 0 1 8 0v4\"></path>\n    </svg>\n    <div>\n      <strong>Uso interno.</strong> Este repositório é destinado exclusivamente às equipes das Secretarias Estaduais de Saúde e à Equipe do Projeto. O conteúdo não deve ser reproduzido ou compartilhado fora desse escopo sem autorização. Dúvidas: <a href=\"mailto:federalizacao.rnds@saude.gov.br\">federalizacao.rnds@saude.gov.br</a>\n    </div>\n  </div>\n</div>\n\n<main>\n\n  <!-- HOME -->\n  <section class=\"home\" id=\"home\">\n    <p class=\"home-eyebrow\">Etapa Estadual · 2026</p>\n    <h2>Bem-vindas e bem-vindos</h2>\n    <p>\n      Este repositório reúne os materiais de apoio produzidos no âmbito do Projeto de Federalização da Rede Nacional de Dados em Saúde (RNDS) para uso das equipes estaduais participantes da Etapa Estadual. Os documentos estão organizados por domínio do Projeto e por tipo de material, e devem ser consultados como referência ao longo de todo o processo de elaboração e revisão do Plano de Trabalho.\n    </p>\n    <div class=\"home-meta\">\n      <div class=\"home-meta-item\"><span></span><span>8 seções temáticas</span></div>\n      <div class=\"home-meta-item\"><span></span><span>31 materiais disponíveis</span></div>\n      <div class=\"home-meta-item\"><span></span><span>Oficina de Plano de Trabalho · 7 a 10 de julho de 2026</span></div>\n    </div>\n  </section>\n\n  <!-- SEÇÃO 1 · Materiais Gerais -->\n  <section class=\"section\" id=\"materiais-gerais\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 01</div>\n      <h3>Materiais Gerais</h3>\n      <p class=\"subtitle\">Documentos de referência transversal, aplicáveis a todos os domínios do Projeto.</p>\n    </div>\n\n    <div class=\"grid\">\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag glossario\">Glossário</span></div>\n        <h4>Glossário da Federalização da RNDS</h4>\n        <p>Define os termos, conceitos e siglas utilizados no âmbito do Projeto de Federalização da RNDS. Recomendado como ponto de partida para equipes que estão iniciando a participação no Projeto ou que queiram alinhar o vocabulário interno.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQCSf90T1nA4T7HkEx65ihOvASiXNTQ0x85NpTmZV-dqB9Q?e=bxLNqg\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag glossario\">Glossário</span></div>\n        <h4>Glossário de Termos e Conceitos — Instrumento de Levantamento de Cenários</h4>\n        <p>Define os termos, conceitos e siglas empregados no Instrumento de Levantamento de Cenários (ILC). Apoia o alinhamento de vocabulário durante o preenchimento e a leitura dos cenários no âmbito do Projeto de Federalização da RNDS.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQDa6sWjMmB7SaV1lzkWTzwoAQ7OqF-lCpX54Q79Xznf6_g?e=SC7frD\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n    </div>\n  </section>\n\n  <!-- SEÇÃO 2 · Plano de Trabalho -->\n  <section class=\"section\" id=\"plano-trabalho\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 02</div>\n      <h3>Plano de Trabalho</h3>\n      <p class=\"subtitle\">Materiais de apoio ao planejamento, preenchimento dos Painéis de Navegação e elaboração do Plano de Trabalho da Federalização.</p>\n    </div>\n\n    <div class=\"grid\">\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag guia\">Guia</span></div>\n        <h4>Guia Orientativo para Estruturação do Plano de Trabalho</h4>\n        <p>Orienta a elaboração do Plano de Trabalho da Federalização da RNDS, detalhando a lógica do documento, seus componentes e o que se espera de cada seção. Leitura essencial antes da Oficina Online de Plano de Trabalho (7 a 10 de julho de 2026).</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQAaBNsLk-tMTbVKtLlICc6WAch8c15nQzCPGVAxoEMtGlk?e=P1nKt6\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag video\">Vídeo</span></div>\n        <h4>Devolutiva ILC e Plano de Trabalho: Apoio à Gestão de Projetos e Processos</h4>\n        <p>Vídeo que resgata os principais pontos trabalhados sobre o ILC ao longo da linha do tempo, apresenta a estrutura do Relatório de Análise de Cenário e orienta a elaboração do Plano de Trabalho do Projeto de Federalização da RNDS.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:v:/g/personal/lucas_alexandrino_saude_gov_br/IQC-TmhNtvhxQ5J0KeDXCBVTAV7YWWXW1Oj-Qm4YxP_k4RY?nav=eyJyZWZlcnJhbEluZm8iOnsicmVmZXJyYWxBcHAiOiJPbmVEcml2ZUZvckJ1c2luZXNzIiwicmVmZXJyYWxBcHBQbGF0Zm9ybSI6IldlYiIsInJlZmVycmFsTW9kZSI6InZpZXciLCJyZWZlcnJhbFZpZXciOiJNeUZpbGVzTGlua0NvcHkifX0&amp;e=Vf879b\" target=\"_blank\" rel=\"noopener\">Assistir ao vídeo\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apresentacao\">Apresentação</span></div>\n        <h4>Devolutiva ILC e Plano de Trabalho: Apoio à Gestão de Projetos e Processos</h4>\n        <p>Apresentação que acompanha a devolutiva do ILC: retoma a linha do tempo, detalha a estrutura do Relatório de Análise de Cenário e reúne as orientações para a elaboração do Plano de Trabalho.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQAjpNIrOY3mRY7F4pZrzHr2AcS3wgXrn51rvITktvpYZUE?e=HOEhvy\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag guia\">Guia</span></div>\n        <h4>Guia Orientativo para Preenchimento do Painel de Navegação — Domínios Institucional e Governança</h4>\n        <p>Orienta o preenchimento do Painel de Navegação dos Domínios Institucional e Governança, explicando a lógica de cada campo, a relação entre objetivo estratégico e cenário-alvo, e como organizar as atividades por subdomínio. Consultar antes e durante o preenchimento do Painel.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQCt6Dm1wdDUQKGtqG3nKBR2ATvD45CRlm5qQqCsKKJOs_k?e=ueknkj\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag painel\">Painel</span></div>\n        <h4>Painel de Navegação — Domínio Institucional</h4>\n        <p>Planilha estruturada para o registro das atividades planejadas pela SES no Domínio Institucional, com campos para objetivo estratégico, cenário-alvo por subdomínio, responsáveis, prazos, metas, indicadores e inter-relações. Instrumento central de gestão e monitoramento do Plano de Trabalho neste domínio.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:x:/g/personal/lucas_alexandrino_saude_gov_br/IQDxknx16Tb7SLhlKwWnAuIuAX88i57BEDz3_qwMkqtjx6Q?e=CWxrrK\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag painel\">Painel</span></div>\n        <h4>Painel de Navegação — Domínio Governança</h4>\n        <p>Planilha estruturada para o registro das atividades planejadas pela SES no Domínio Governança, com campos para objetivo estratégico, cenário-alvo por subdomínio, responsáveis, prazos, metas, indicadores e inter-relações. Instrumento central de gestão e monitoramento do Plano de Trabalho neste domínio.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:x:/g/personal/lucas_alexandrino_saude_gov_br/IQDOA3EhRU6mQb4SVPsB649hAVZDYGEv6HhamwL3jQ-fqzk?e=u46HRE\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag video\">Vídeo</span></div>\n        <h4>Estruturação das Atividades dos Domínios Institucional e Governança</h4>\n        <p>Vídeo de apoio à estruturação e organização das atividades dos Domínios Institucional e Governança para composição do Plano de Trabalho, com orientações e ferramentas que auxiliam no preenchimento e no monitoramento dessas atividades.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:v:/g/personal/lucas_alexandrino_saude_gov_br/IQBoLE_mzEa6S5BN_e3C-e57ATNdfL2zZEmpNTjhu7PpeQc?nav=eyJyZWZlcnJhbEluZm8iOnsicmVmZXJyYWxBcHAiOiJPbmVEcml2ZUZvckJ1c2luZXNzIiwicmVmZXJyYWxBcHBQbGF0Zm9ybSI6IldlYiIsInJlZmVycmFsTW9kZSI6InZpZXciLCJyZWZlcnJhbFZpZXciOiJNeUZpbGVzTGlua0NvcHkifX0&amp;e=UdARZC\" target=\"_blank\" rel=\"noopener\">Assistir ao vídeo\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apresentacao\">Apresentação</span></div>\n        <h4>Estruturação das Atividades dos Domínios Institucional e Governança</h4>\n        <p>Apresentação de apoio à estruturação e organização das atividades dos Domínios Institucional e Governança para composição do Plano de Trabalho, reunindo orientações e ferramentas de preenchimento e monitoramento.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQBEjOw617SGQodTzntcANjgAat_t_cWbUulPWnKsz67pKs?e=Gqcf40\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag guia\">Guia</span></div>\n        <h4>Guia de Orientação para as Agendas Bilaterais e Preenchimento do Painel de Navegação — Domínio Informação e Informática</h4>\n        <p>Orienta a preparação e a condução das Agendas Bilaterais do Domínio Informação e Informática e o preenchimento do respectivo Painel de Navegação, explicando a lógica de cada campo e como organizar as atividades por subdomínio. Consultar antes e durante o preenchimento do Painel.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQDZrzLD-CG5SK4FYDymXtARAa7v6eVPh7shUuwXwC6mTrE?e=BrP9RT\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag painel\">Painel</span></div>\n        <h4>Painel de Navegação — Domínio Informação e Informática</h4>\n        <p>Planilha estruturada para o registro das atividades planejadas pela SES no Domínio Informação e Informática, com campos para objetivo estratégico, cenário-alvo por subdomínio, responsáveis, prazos, metas, indicadores e inter-relações. É o instrumento central de gestão e monitoramento do Plano de Trabalho neste domínio.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:x:/g/personal/lucas_alexandrino_saude_gov_br/IQCytD9TrrGZTq1D-C96e4-tAXG__CCbnY2926BaZrF2_fY?e=SkXp5C\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag instrumento\">Instrumento</span></div>\n        <h4>Instrumento de Levantamento de Infraestrutura, Sistemas e Interoperabilidade com a RNDS</h4>\n        <p>Instrumento para organizar o diagnóstico situacional do estado — infraestrutura de TI, sistemas, segurança e interoperabilidade — e, a partir dele, planejar as ações necessárias à implementação da Federalização da RNDS no território. Apoia diretamente a construção do Plano de Trabalho.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:x:/g/personal/lucas_alexandrino_saude_gov_br/IQAd5smKh8SrTK5OLEmFZrheAQKzi5sYb8TeMyKXQFZcHoM?e=ObdKBl\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apresentacao\">Apresentação</span></div>\n        <h4>Visão Geral dos Planos de Trabalho</h4>\n        <p>Apresenta uma análise geral dos Planos de Trabalho dos estados, considerando cenários-alvo, objetivos estratégicos, detalhamento das atividades, estratégias, metas, indicadores e períodos.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQAcvEKZC8MxTYYuBWbLU6ZNAQtWjXppDw-tj-mNqcEtuyI?e=VDkJBP\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apresentacao\">Apresentação</span></div>\n        <h4>Encontros Bilaterais — Apoio à Gestão de Projeto e Processos</h4>\n        <p>Resgata os principais pontos trabalhados na 1ª Oficina do Projeto, orienta a gestão de processos a partir dos Pontos de Ancoragem para o planejamento na SES e apresenta ferramentas de apoio à gestão de projetos e processos.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQBJD5PizUaeR4TxeweAwGCeAcqE_XdZQi5Y75VNrdIx9fs?e=HpMTHn\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag template\">Template</span></div>\n        <h4>Agenda Bilateral — Plano de Trabalho dos Domínios Institucional e Governança</h4>\n        <p>Modelo para apresentação dos Domínios Institucional e Governança nas Agendas Bilaterais, com campos para cenário-alvo, objetivo estratégico, nome da atividade, descrição e prazo.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQDEegEpdaDVQZ97XOPQktzNAa-RYDyFTIv74hR4DxmCIG4?e=z1Q43I\" target=\"_blank\" rel=\"noopener\">Acessar modelo\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apresentacao\">Apresentação</span><span class=\"tag template\">Template</span></div>\n        <h4>Agenda Bilateral — Domínio Informação e Informática</h4>\n        <p>Modelo para apresentação do Domínio Informação e Informática nas Agendas Bilaterais, contemplando cenário-alvo, objetivo estratégico, infraestrutura e arquitetura de processamento de dados.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQDVOFEP3t0BQY6mmamIL3leAelUVtoF-o-xvzK_2Y8ug8E?e=fBkIE2\" target=\"_blank\" rel=\"noopener\">Acessar modelo\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apresentacao\">Apresentação</span></div>\n        <h4>Preparatória para a Oficina Online de Planos de Trabalho</h4>\n        <p>Apoia o resgate da trajetória do Projeto e a reflexão sobre o momento atual da Etapa Estadual, retomando criticamente o propósito dos cenários-alvo e objetivos estratégicos e preparando os representantes para a 6ª Oficina do Projeto de Federalização da RNDS.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQAxIXZCRd2aRad6eR8LWVMiATlNB1ekpqZoPMizHnrHjIc?e=3oTe0K\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n    </div>\n  </section>\n\n  <!-- SEÇÃO 3 · Institucional e Governança -->\n  <section class=\"section\" id=\"institucional-governanca\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 03 · Domínio</div>\n      <h3>Institucional e Governança</h3>\n      <p class=\"subtitle\">Materiais de apoio ao Domínio Institucional e Governança.</p>\n    </div>\n\n    <div class=\"inner-notice\" role=\"note\">\n      <svg class=\"inner-notice-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n        <circle cx=\"12\" cy=\"12\" r=\"9\"></circle>\n        <path d=\"M12 7v5l3 2\"></path>\n      </svg>\n      <div>Os materiais desta seção serão disponibilizados em breve.</div>\n    </div>\n\n  </section>\n\n  <!-- SEÇÃO 4 · Informação e Informática -->\n  <section class=\"section\" id=\"informacao-informatica\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 04 · Domínio</div>\n      <h3>Informação e Informática</h3>\n      <p class=\"subtitle\">Materiais de apoio ao diagnóstico técnico e ao planejamento do Domínio Informação e Informática.</p>\n    </div>\n\n    <div class=\"grid\">\n\n      <article class=\"card\">\n        <div class=\"card-tags\">\n          <span class=\"tag relatorio\">Relatório</span>\n          <span class=\"tag warn\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9v4\"></path><path d=\"M12 17h.01\"></path><path d=\"M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z\"></path></svg>\n            Documento personalizado por estado\n          </span>\n        </div>\n        <h4>Relatório sobre Dados da Rede Nacional de Dados em Saúde</h4>\n        <p>Apresenta a condição atual do estado em relação ao envio e ao uso dos dados da RNDS, com panorama dos modelos de informação, da volumetria histórica e da arquitetura de integração. Útil para subsidiar a definição de cenários-alvo e a leitura de contexto no Plano de Trabalho. Caso seu estado não tenha recebido este relatório, entre em contato com a equipe do Projeto.</p>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apresentacao\">Apresentação</span></div>\n        <h4>Cenário dos Dados da Rede Nacional de Dados em Saúde</h4>\n        <p>Apresenta o documento sobre o cenário dos dados da RNDS, explicando sua lógica e organização e seu uso no Plano de Trabalho estadual.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQDqL3b9ypUURJ2gS1xSa09cAYzGKBJ5cBkH5jL7Zhs2Jxg?e=FwAFsl\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n    </div>\n  </section>\n\n  <!-- SEÇÃO 5 · Comunicação -->\n  <section class=\"section\" id=\"comunicacao\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 05 · Domínio</div>\n      <h3>Comunicação</h3>\n      <p class=\"subtitle\">Materiais de apoio ao planejamento estratégico de comunicação no âmbito do Projeto.</p>\n    </div>\n\n    <div class=\"inner-notice\" role=\"note\">\n      <svg class=\"inner-notice-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n        <circle cx=\"12\" cy=\"12\" r=\"9\"></circle>\n        <path d=\"M12 7v5l3 2\"></path>\n      </svg>\n      <div>O Painel de Navegação do Domínio Comunicação e os materiais associados serão trabalhados em momento específico, com apoio da equipe de comunicação do Projeto, com prazos a serem informados oportunamente. Os materiais abaixo estão disponíveis para consulta e leitura prévia.</div>\n    </div>\n\n    <div class=\"grid\">\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag guia\">Guia</span></div>\n        <h4>Guia de Comunicação do Projeto de Federalização da RNDS</h4>\n        <p>Orienta o planejamento, a execução e o aprimoramento da comunicação do Projeto de Federalização da RNDS no âmbito da SES. Aborda públicos, mensagens estratégicas, canais e boas práticas de comunicação institucional para o contexto da Federalização.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQBNEyeikKSkRLAnq2R9zAeyAZlwSg01itiUZJrR_3KRLE0?e=FbfAwZ\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag material\">Material de Referência</span></div>\n        <h4>Cartilha de Comunicação da Federalização da RNDS</h4>\n        <p>Material de apoio à comunicação da Federalização da RNDS voltado às equipes de comunicação das Secretarias Estaduais de Saúde. Apresenta conceitos centrais do Projeto, orientações para comunicação com diferentes públicos e recursos para produção de conteúdo institucional.</p>\n        <span class=\"status-dev\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"9\"></circle><path d=\"M12 7v5l3 2\"></path></svg>\n          Em desenvolvimento\n        </span>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag instrumento\">Instrumento</span></div>\n        <h4>Painel de Navegação — Domínio Comunicação</h4>\n        <p>Instrumento de planejamento e gestão das ações de comunicação da SES no âmbito da Federalização da RNDS. Possui estrutura diferenciada dos demais Painéis, organizada em camadas — gestão estratégica, estrutura e sustentação, execução e rotina, e monitoramento e continuidade — para refletir a lógica própria do trabalho de comunicação.</p>\n        <span class=\"status-dev\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"9\"></circle><path d=\"M12 7v5l3 2\"></path></svg>\n          Em desenvolvimento\n        </span>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag guia\">Guia</span></div>\n        <h4>Guia Orientativo para Preenchimento do Painel de Navegação — Domínio Comunicação</h4>\n        <p>Orienta o preenchimento do Painel de Navegação do Domínio Comunicação, explicando a lógica de cada camada, a relação entre as prioridades estratégicas e as ações previstas, e como utilizar o instrumento como ferramenta viva de gestão da comunicação da Federalização na SES.</p>\n        <span class=\"status-dev\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"9\"></circle><path d=\"M12 7v5l3 2\"></path></svg>\n          Em desenvolvimento\n        </span>\n      </article>\n\n    </div>\n  </section>\n\n  <!-- SEÇÃO 6 · Jornada -->\n  <section class=\"section\" id=\"jornada\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 06</div>\n      <h3>Jornada</h3>\n      <p class=\"subtitle\">Orientações de apoio às etapas operacionais da jornada do estado no Projeto.</p>\n    </div>\n\n    <div class=\"grid\">\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag guia\">Guia</span></div>\n        <h4>Orientações para Preenchimento do Termo de Responsabilidade</h4>\n        <p>Orienta o preenchimento do Termo de Responsabilidade necessário à criação da credencial de acesso ao bucket de dados da RNDS.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQAyka-Jjc6DQZOgCm0LNuotAYB1ssqMDNuQyJzDiGDcibQ?e=24Fyv1\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n    </div>\n  </section>\n\n  <!-- SEÇÃO 7 · Apêndice -->\n  <section class=\"section\" id=\"apendice\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 07</div>\n      <h3>Apêndice</h3>\n      <p class=\"subtitle\">Materiais complementares de referência técnica.</p>\n    </div>\n\n    <div class=\"grid\">\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag apendice\">Apêndice</span></div>\n        <h4>Apêndice — Descritivo dos Modelos de Informação</h4>\n        <p>Descreve os Modelos de Informação disponíveis no Portal de Serviços do Ministério da Saúde quanto a objetivo, escopo, estrutura e obrigatoriedade, no contexto da RNDS.</p>\n        <a class=\"btn\" href=\"https://saudegov-my.sharepoint.com/:b:/g/personal/lucas_alexandrino_saude_gov_br/IQA4ZEuvuXteRbWYDyO8eIt_AetTrgeYiKV-IJk21InBdZY?e=UudoTa\" target=\"_blank\" rel=\"noopener\">Acessar documento\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n    </div>\n  </section>\n\n  <!-- SEÇÃO 8 · Formulários -->\n  <section class=\"section\" id=\"formularios\">\n    <div class=\"section-head\">\n      <div class=\"section-label\">Seção 09</div>\n      <h3>Formulários</h3>\n      <p class=\"subtitle\">Formulários de confirmação, atividades pré-oficina e registros no âmbito do Projeto.</p>\n    </div>\n\n    <div class=\"grid\">\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag formulario\">Formulário</span></div>\n        <h4>Confirmação participação - 6ª Oficina do Projeto de Federalização da RNDS</h4>\n        <p>Este formulário tem como objetivo confirmar a presença, de forma integral, na 6ª Oficina do Projeto de Federalização da RNDS, no período de 7 a 10 de Julho de 2026, em formato On-Line.<br><br>Prazo para preenchimento: 10/06/2026</p>\n        <a class=\"btn\" href=\"https://forms.cloud.microsoft/r/RmwG32f4fE\" target=\"_blank\" rel=\"noopener\">Acessar formulário\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag formulario\">Formulário</span></div>\n        <h4>Atividade Pré-oficina Domínio Informação e Informática: &quot;O Plano de Trabalho como instrumento vivo&quot;</h4>\n        <p>Este formulário tem como objetivo apoiar a reflexão estratégica da SES sobre o Plano de Trabalho do Projeto de Federalização da RNDS, em especial a coerência entre os cenários-alvo e objetivos estratégicos definidos para os Subdomínios e para o Domínio Informática e Informação no Painel de Navegação.<br><br>Prazo para preenchimento: 22/06/2026</p>\n        <a class=\"btn\" href=\"https://forms.office.com/r/pZEvApX8dP\" target=\"_blank\" rel=\"noopener\">Acessar formulário\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag formulario\">Formulário</span></div>\n        <h4>Atividade Pré-oficina Domínio Governança: &quot;O Plano de Trabalho como instrumento vivo&quot;</h4>\n        <p>Este formulário tem como objetivo apoiar a reflexão estratégica da SES sobre o Plano de Trabalho do Projeto de Federalização da RNDS, em especial a coerência entre os cenários-alvo e objetivos estratégicos definidos para os Subdomínios e para o Domínio Governança no Painel de Navegação.<br><br>Prazo para preenchimento: 22/06/2026</p>\n        <a class=\"btn\" href=\"https://forms.office.com/r/MdqwbfYskY\" target=\"_blank\" rel=\"noopener\">Acessar formulário\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag formulario\">Formulário</span></div>\n        <h4>Atividade Pré-oficina Domínio Institucional: &quot;O Plano de Trabalho como instrumento vivo&quot;</h4>\n        <p>Este formulário tem como objetivo apoiar a reflexão estratégica da SES sobre o Plano de Trabalho do Projeto de Federalização da RNDS, em especial a coerência entre os cenários-alvo e objetivos estratégicos definidos para os Subdomínios e para o Domínio Institucional no Painel de Navegação.<br><br>Prazo para preenchimento: 22/06/2026</p>\n        <a class=\"btn\" href=\"https://forms.office.com/r/k9WmyNasV5\" target=\"_blank\" rel=\"noopener\">Acessar formulário\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n      <article class=\"card\">\n        <div class=\"card-tags\"><span class=\"tag formulario\">Formulário</span></div>\n        <h4>Jornada dos Dados | Encontro 2 - Tratamento e Processamento</h4>\n        <p>Este formulário deve ser respondido antes do Encontro 2 da Jornada dos Dados. As respostas serão analisadas pela equipe do projeto e apresentadas durante o encontro, servindo de base para as orientações e a troca de experiências entre os estados.<br><br>Prazo para preenchimento: 19/06/2026</p>\n        <a class=\"btn\" href=\"https://forms.cloud.microsoft/pages/responsepage.aspx?id=00pVmiu1Ykijb4TYkeXHBaBpc_UX31dGn9ITBBcnnZhUQ0o0SzgwVDlWMU5BSTM4NEg2VU5XSVozOC4u&amp;route=shorturl\" target=\"_blank\" rel=\"noopener\">Acessar formulário\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7\"></path><path d=\"M8 7h9v9\"></path></svg>\n        </a>\n      </article>\n\n    </div>\n  </section>\n\n</main>\n\n<footer class=\"site-footer\">\n  <div class=\"footer-inner\">\n    <div class=\"footer-brand\">\n      <h5>Projeto de Federalização da RNDS</h5>\n      <p>SEIDIGI / DATASUS / CGIIS — HAOC / PROADI-SUS</p>\n      <p>Este repositório é de uso interno. Acesso restrito às equipes do Projeto.</p>\n    </div>\n    <div class=\"footer-contact\">\n      <strong>Dúvidas ou solicitações</strong>\n      <a href=\"mailto:federalizacao.rnds@saude.gov.br\">federalizacao.rnds@saude.gov.br</a>\n    </div>\n  </div>\n  <div class=\"footer-logos\">\n    <span class=\"footer-logos-label\">Realização e parcerias</span>\n    <div class=\"logo-band\">\n      <img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVF
